# Nginx Reverse Proxy Configuration for Village Planning Agent
#
# Usage:
#   1. Copy this file to /etc/nginx/sites-available/village-planning
#   2. Create symlink: ln -s /etc/nginx/sites-available/village-planning /etc/nginx/sites-enabled/
#   3. Test config: nginx -t
#   4. Reload: systemctl reload nginx
#
# For Docker deployment, use docker-compose.prod.yml which includes Nginx service

upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 16;
}

# HTTP server (redirect to HTTPS in production)
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Health check endpoint (no redirect)
    location /health {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Redirect all other traffic to HTTPS
    # Comment out this block if you don't have SSL configured
    # return 301 https://$host$request_uri;

    # Development mode: serve directly without SSL redirect
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

