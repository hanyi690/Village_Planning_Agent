    {filtered_analysis}

    **规划思路**：
    {filtered_concepts}

    **约束条件**: {constraints}

    **规划要点**：
    ## 1. 道路网规划
    - **道路分级**：对外联系道路、村干道、村支路、巷道
    - **路网结构**：确定路网形态（方格网、自由式等）
    - **道路布局**：各级道路的线路走向和连接关系
    - **断面设计**：不同道路的横断面组成

    ## 2. 交通组织
    - **机动车交通**：客货分流、过境交通组织
    - **慢行交通**：步行道、自行车道规划
    - **停车设施**：公共停车场、配建停车
    - **交通节点**：交叉口、公交站、出入口设计

    ## 3. 道路竖向规划
    - **竖向设计**：道路标高、纵坡设计
    - **排水方向**：路面排水组织
    - **土方平衡**：填挖土方量估算

    ## 4. 交通安全设施
    - **交通标志**：警告、禁令、指示标志设置
    - **交通标线**：车道线、人行横道线等
    - **安全设施**：护栏、减速带、凸面镜等

    ## 5. 道路景观
    - **行道树**：树种选择、种植方式
    - **绿化隔离带**：中央分隔带、侧分带绿化
    - **道路照明**：路灯布置、灯具选择

    ## 6. 建设标准
    - **技术标准**：道路等级、设计速度、荷载标准
    - **工程量**：道路长度、面积、土方量

