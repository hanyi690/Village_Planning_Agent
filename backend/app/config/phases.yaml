# 村庄规划阶段配置
# 此文件是28维度配置的唯一来源

phases:
  # Layer 1: 现状分析（12维度，并行执行）
  - id: layer1
    name: "现状分析"
    execution: parallel
    dimensions:
      - key: location
        name: "区位与对外交通分析"
        tools: []
        rag_query: "村庄区位条件分析 对外交通规划要求 交通设施配置标准"
        prefer_doc_types: [standard]
        depends_on: []

      - key: socio_economic
        name: "社会经济分析"
        tools: []
        rag_query: "村庄人口规模预测方法 人均建设用地指标 人口增长率计算"
        prefer_doc_types: [policy, standard]
        depends_on: []

      - key: villager_wishes
        name: "村民意愿与诉求分析"
        tools: []
        rag_query: "村民意愿调查方法 村庄规划公众参与 问卷调查技术规范"
        prefer_doc_types: [standard, guide]
        depends_on: []

      - key: superior_planning
        name: "上位规划与政策导向分析"
        tools: []
        rag_query: "上位规划衔接要求 村庄规划政策依据 土地利用总体规划"
        prefer_doc_types: [policy, planning]
        depends_on: []

      - key: natural_environment
        name: "自然环境分析"
        tools: []
        rag_query: "村庄自然环境评价 地形地貌分析技术 生态敏感性评价"
        prefer_doc_types: [standard, guide]
        depends_on: []

      - key: land_use
        name: "土地利用分析"
        tools: []
        rag_query: "村庄用地分类标准 建设用地指标控制 土地利用现状调查"
        prefer_doc_types: [policy, standard]
        depends_on: []

      - key: traffic
        name: "道路交通分析"
        tools: ["accessibility_analysis"]
        rag_query: "村庄道路等级分类 交通可达性分析 道路宽度标准"
        prefer_doc_types: [standard, guide]
        depends_on: []

      - key: public_services
        name: "公共服务设施分析"
        tools: []
        rag_query: "村庄公共服务设施配置标准 村级公共服务设施规划要求"
        prefer_doc_types: [standard, policy]
        depends_on: []

      - key: infrastructure
        name: "基础设施分析"
        tools: []
        rag_query: "村庄基础设施配置标准 给排水设施规划 电力通信设施"
        prefer_doc_types: [standard, guide]
        depends_on: []

      - key: ecological_green
        name: "生态绿地分析"
        tools: []
        rag_query: "村庄绿地系统规划 生态保护红线划定 绿地覆盖率标准"
        prefer_doc_types: [standard, guide]
        depends_on: []

      - key: architecture
        name: "建筑分析"
        tools: []
        rag_query: "村庄建筑质量评价 农房建设标准 建筑风貌分类"
        prefer_doc_types: [standard, policy]
        depends_on: []

      - key: historical_culture
        name: "历史文化与乡愁保护分析"
        tools: []
        rag_query: "历史文化保护规划 传统村落保护要求 乡土文化传承"
        prefer_doc_types: [policy, standard]
        depends_on: []

  # Layer 2: 规划思路（4维度，Wave波次执行）
  - id: layer2
    name: "规划思路"
    execution: wave
    dimensions:
      - key: resource_endowment
        name: "资源禀赋分析"
        tools: []
        rag_query: ""
        depends_on: []
        layer_depends_on:
          - "natural_environment"
          - "land_use"
          - "socio_economic"
          - "historical_culture"
          - "architecture"
          - "public_services"

      - key: planning_positioning
        name: "规划定位分析"
        tools: []
        rag_query: ""
        depends_on: ["resource_endowment"]
        layer_depends_on:
          - "location"
          - "socio_economic"
          - "superior_planning"

      - key: development_goals
        name: "发展目标分析"
        tools: ["population_model_v1"]
        rag_query: ""
        depends_on: ["resource_endowment", "planning_positioning"]
        layer_depends_on:
          - "socio_economic"
          - "superior_planning"

      - key: planning_strategies
        name: "规划策略分析"
        tools: []
        rag_query: ""
        depends_on: ["resource_endowment", "planning_positioning", "development_goals"]
        layer_depends_on:
          - "natural_environment"
          - "land_use"
          - "traffic"
          - "infrastructure"
          - "historical_culture"

  # Layer 3: 详细规划（12维度，Wave波次执行）
  - id: layer3
    name: "详细规划"
    execution: wave
    dimensions:
      - key: industry
        name: "产业规划"
        tools: []
        rag_query: "村庄产业发展规划 农村产业布局 一二三产融合"
        prefer_doc_types: [policy, standard, case]
        depends_on: []
        layer_depends_on:
          - "socio_economic"
          - "land_use"
        phase_depends_on:
          - "resource_endowment"
          - "planning_positioning"
          - "planning_strategies"

      - key: spatial_structure
        name: "空间结构规划"
        tools: ["spatial_layout_generator"]
        rag_query: "村庄空间结构规划 空间布局模式 一核多点布局"
        prefer_doc_types: [standard, case]
        depends_on: []
        layer_depends_on:
          - "natural_environment"
          - "land_use"
        phase_depends_on:
          - "planning_positioning"
          - "planning_strategies"

      - key: land_use_planning
        name: "土地利用规划"
        tools: []
        rag_query: "村庄土地利用规划 用地布局方案 建设用地边界划定"
        prefer_doc_types: [policy, standard]
        depends_on: []
        layer_depends_on:
          - "land_use"
          - "natural_environment"
        phase_depends_on:
          - "planning_positioning"
          - "planning_strategies"

      - key: settlement_planning
        name: "居民点规划"
        tools: []
        rag_query: "村庄居民点布局 农村居民点规划 自然村整治方案"
        prefer_doc_types: [standard, case]
        depends_on: []
        layer_depends_on:
          - "socio_economic"
        phase_depends_on:
          - "planning_positioning"
          - "planning_strategies"

      - key: traffic_planning
        name: "道路交通规划"
        tools: []
        rag_query: "村庄道路规划技术 道路红线宽度 村内道路等级"
        prefer_doc_types: [standard]
        depends_on: []
        layer_depends_on:
          - "traffic"
        phase_depends_on:
          - "planning_strategies"

      - key: public_service
        name: "公共服务设施规划"
        tools: []
        rag_query: "村庄公共服务设施配置 公共设施用地指标 村级服务中心"
        prefer_doc_types: [standard]
        depends_on: []
        layer_depends_on:
          - "public_services"
          - "socio_economic"
        phase_depends_on:
          - "planning_strategies"

      - key: infrastructure_planning
        name: "基础设施规划"
        tools: []
        rag_query: "村庄基础设施规划 给排水管网设计 电力通信规划"
        prefer_doc_types: [standard, guide]
        depends_on: []
        layer_depends_on:
          - "infrastructure"
        phase_depends_on:
          - "planning_strategies"

      - key: ecological
        name: "生态绿地规划"
        tools: []
        rag_query: "村庄绿地规划 生态保护用地 公园绿地设计"
        prefer_doc_types: [standard, guide]
        depends_on: []
        layer_depends_on:
          - "ecological_green"
        phase_depends_on:
          - "planning_strategies"

      - key: disaster_prevention
        name: "防震减灾规划"
        tools: []
        rag_query: "村庄防灾规划 地质灾害防治 消防通道设置"
        prefer_doc_types: [standard, policy]
        depends_on: []
        layer_depends_on:
          - "infrastructure"
          - "architecture"
        phase_depends_on:
          - "planning_positioning"
          - "planning_strategies"

      - key: heritage
        name: "历史文保规划"
        tools: []
        rag_query: "历史文化保护规划 传统建筑保护 历史风貌区划定"
        prefer_doc_types: [policy, standard]
        depends_on: []
        layer_depends_on:
          - "historical_culture"
        phase_depends_on:
          - "planning_positioning"
          - "planning_strategies"

      - key: landscape
        name: "村庄风貌指引"
        tools: []
        rag_query: "村庄风貌设计 建筑风貌引导 村容村貌整治"
        prefer_doc_types: [standard, guide, case]
        depends_on: []
        layer_depends_on:
          - "architecture"
          - "historical_culture"
        phase_depends_on:
          - "planning_positioning"
          - "planning_strategies"

      - key: project_bank
        name: "建设项目库"
        tools: []
        rag_query: ""
        depends_on:
          - "industry"
          - "spatial_structure"
          - "land_use_planning"
          - "settlement_planning"
          - "traffic_planning"
          - "public_service"
          - "infrastructure_planning"
          - "ecological"
          - "disaster_prevention"
          - "heritage"
          - "landscape"
        layer_depends_on: []
        phase_depends_on: 
          - "resource_endowment"
          - "planning_positioning"
          -  "development_goals"
          - "planning_strategies"
