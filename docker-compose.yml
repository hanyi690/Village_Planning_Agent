# Docker Compose for Village Planning Agent
# Usage: docker-compose up -d
# For faster builds, use: DOCKER_BUILDKIT=1 docker-compose up -d

version: '3.8'

services:
  # ============================================
  # Backend Service
  # ============================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      # Enable BuildKit for better caching
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: village-planning-backend:latest
    container_name: village-planning-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - USE_ASYNC_DATABASE=true
      - ZHIPUAI_API_KEY=${ZHIPUAI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - LLM_MODEL=${LLM_MODEL:-glm-4-flash}
      - LLM_PROVIDER=${LLM_PROVIDER:-zhipuai}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
      # Embedding Model Configuration
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-BAAI/bge-small-zh-v1.5}
      - EMBEDDING_DEVICE=${EMBEDDING_DEVICE:-cpu}
      # HuggingFace Configuration (auto-detect offline mode)
      - HF_ENDPOINT=${HF_ENDPOINT:-https://hf-mirror.com}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./results:/app/results
      - ./knowledge_base:/app/knowledge_base
      # Mount HuggingFace cache for faster startup
      # Option 1: Mount local cache (if you have pre-downloaded models)
      # - ./models:/home/appuser/.cache/huggingface
      # Option 2: Use host cache directory (read-write for auto-download)
      - ${HF_CACHE_DIR:-./hf_cache}:/home/appuser/.cache/huggingface
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    # Log rotation
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - village-planning-network

  # ============================================
  # Frontend Service
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Enable BuildKit for better caching
      args:
        - BUILDKIT_INLINE_CACHE=1
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    image: village-planning-frontend:latest
    container_name: village-planning-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    # Log rotation
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - village-planning-network

# ============================================
# Networks
# ============================================
networks:
  village-planning-network:
    driver: bridge