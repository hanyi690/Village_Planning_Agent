# Docker Compose for Village Planning Agent

services:
  # ============================================
  # Backend Service
  # ============================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: village-planning-backend:latest
    container_name: village-planning-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - ENVIRONMENT=production
      - USE_ASYNC_DATABASE=true
      # LLM Configuration
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - LLM_MODEL=${LLM_MODEL:-qwen3.5-plus}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - MAX_TOKENS=${MAX_TOKENS:-65536}
      - MULTIMODAL_ENABLED=${MULTIMODAL_ENABLED:-true}
      - OCR_MODEL_NAME=${OCR_MODEL_NAME:-qwen-vl-max}
      # LLM Concurrency Control
      - LLM_MAX_CONCURRENT=${LLM_MAX_CONCURRENT:-4}
      - LLM_STREAM_TIMEOUT=${LLM_STREAM_TIMEOUT:-300}
      # GIS API Keys
      - TIANDITU_API_KEY=${TIANDITU_API_KEY}
      - AMAP_API_KEY=${AMAP_API_KEY}
      # Embedding Model Configuration
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-aliyun}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - ALIYUN_EMBEDDING_MODEL=${ALIYUN_EMBEDDING_MODEL:-text-embedding-v4}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-1024}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./results:/app/results
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - village-planning-network

  # ============================================
  # Frontend Service
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://backend:8000
    image: village-planning-frontend:latest
    container_name: village-planning-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - village-planning-network

networks:
  village-planning-network:
    driver: bridge
