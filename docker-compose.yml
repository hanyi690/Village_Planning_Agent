# Docker Compose for Village Planning Agent
# Usage: docker-compose up -d

version: '3.8'

services:
  # ============================================
  # Backend Service
  # ============================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: village-planning-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - USE_ASYNC_DATABASE=true
      - ZHIPUAI_API_KEY=${ZHIPUAI_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-glm-4-flash}
      - LLM_PROVIDER=${LLM_PROVIDER:-zhipuai}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./results:/app/results
      - ./knowledge_base:/app/knowledge_base
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - village-planning-network

  # ============================================
  # Frontend Service
  # ============================================
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: village-planning-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - village-planning-network

# ============================================
# Networks
# ============================================
networks:
  village-planning-network:
    driver: bridge

# ============================================
# Volumes (optional, for persistent data)
# ============================================
